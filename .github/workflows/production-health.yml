name: Production health

on:
  schedule:
    # Offset from the top of the hour to reduce GitHub Actions scheduling delays.
    - cron: "17 * * * *"
  workflow_dispatch:
  workflow_run:
    workflows: ["Verify personal site"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: production-health
  cancel-in-progress: true

jobs:
  check-production:
    if: >-
      github.event_name != 'workflow_run' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Check production routes and materials API
        env:
          # Accommodates the short propagation window after a Vercel deployment.
          PRODUCTION_CHECK_RETRIES: "3"
          PRODUCTION_CHECK_RETRY_DELAY_MS: "5000"
        run: node scripts/check-production.mjs
